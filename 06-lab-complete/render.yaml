services:
  - type: web
    name: ai-agent-production
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: LLM_MODEL
        value: openai/gpt-4o-mini
      - key: AGENT_API_KEY
        value: my-secret-key
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "10.0"
      - key: RATE_LIMIT_PER_MINUTE
        value: "10"
      - key: REDIS_URL
        fromRedis:
          name: redis-production
          property: connectionString

redis:
  - name: redis-production
    plan: free
    ipAllowList: []
